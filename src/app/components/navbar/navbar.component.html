<nav class="navbar navbar-expand-lg bg-body border-bottom sticky-top py-3">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" routerLink="/" (click)="close()">
      <span class="brand-mark">AM</span>
      <span>{{ profile.name }}</span>
    </a>

    <button class="navbar-toggler border-0" type="button" (click)="toggle()" aria-label="Toggle navigation">
      <i class="bi" [class.bi-list]="!menuOpen" [class.bi-x-lg]="menuOpen"></i>
    </button>

    <div class="collapse navbar-collapse justify-content-end" [class.show]="menuOpen">
      <ul class="navbar-nav align-items-lg-center gap-lg-1">
        <li class="nav-item" *ngFor="let link of links">
          <a
            class="nav-link"
            [routerLink]="link.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: link.exact }"
            (click)="close()"
          >{{ link.label }}</a>
        </li>
        <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
          <a class="btn btn-primary" routerLink="/contact" (click)="close()">Hire Me</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
