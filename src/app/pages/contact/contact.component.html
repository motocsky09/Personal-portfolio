<section class="section">
  <div class="container">
    <div class="text-center mb-2"><span class="section-label">Contact</span></div>
    <h2 class="section-heading d-block text-center mx-auto">Let's work together</h2>
    <p class="text-center text-muted mx-auto mb-5 intro-text">
      Have a project in mind or just want to say hi? Here's how to reach me.
    </p>

    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="d-flex align-items-start gap-3 mb-4" *ngFor="let info of contactInfo">
          <div class="info-icon"><i class="bi" [ngClass]="info.icon"></i></div>
          <div>
            <div class="fw-semibold">{{ info.label }}</div>
            <a *ngIf="info.url; else plain" [href]="info.url" class="text-muted">{{ info.value }}</a>
            <ng-template #plain><span class="text-muted">{{ info.value }}</span></ng-template>
          </div>
        </div>

        <div class="d-flex gap-3 mt-4 justify-content-center">
          <a
            *ngFor="let social of profile.socials"
            class="social-icon"
            [href]="social.url"
            [attr.aria-label]="social.label"
            target="_blank"
            rel="noopener"
          >
            <i class="bi" [ngClass]="social.icon"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
